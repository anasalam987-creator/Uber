<!DOCTYPE html>

<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>أوبر داشبورد - الرياض</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@400;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">

<style>
:root{--bg:#080c14;--s:#0d1420;--s2:#111827;--b:#1e2d45;--b2:#243552;--a:#00d4ff;--g:#10b981;--r:#ef4444;--o:#f59e0b;--p:#8b5cf6;--t:#e2e8f0;--t2:#94a3b8;--t3:#64748b}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'IBM Plex Sans Arabic',sans-serif;background:var(--bg);color:var(--t);min-height:100vh}
.hdr{padding:14px 20px;border-bottom:1px solid var(--b);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;background:rgba(8,12,20,.95)}
.logo{display:flex;align-items:center;gap:10px}
.logo-icon{width:38px;height:38px;border-radius:10px;background:linear-gradient(135deg,var(--a),var(--p));display:flex;align-items:center;justify-content:center;font-size:1.15em}
.logo h1{font-size:1.05em;font-weight:700}.logo p{font-size:.68em;color:var(--t3)}
.dot{width:7px;height:7px;border-radius:50%;background:var(--g);display:inline-block;margin-left:5px;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.kpis{display:flex;gap:7px;flex-wrap:wrap}
.kpi{background:var(--s);border:1px solid var(--b);border-radius:9px;padding:6px 13px;text-align:center}
.kpi .v{font-size:1.15em;font-weight:700;color:var(--a);font-family:'JetBrains Mono',monospace}
.kpi .l{font-size:.65em;color:var(--t3)}
.tabs{position:sticky;top:0;z-index:9;display:flex;background:rgba(13,20,32,.97);border-bottom:1px solid var(--b);overflow-x:auto}
.tab{padding:12px 17px;cursor:pointer;color:var(--t3);font-size:.83em;font-weight:500;white-space:nowrap;border-bottom:2px solid transparent;transition:all .2s}
.tab.active{color:var(--a);border-bottom-color:var(--a)}
.pane{display:none;padding:18px;max-width:900px;margin:0 auto}
.pane.active{display:block}
.card{background:var(--s);border:1px solid var(--b);border-radius:13px;padding:18px;margin-bottom:14px}
.card h3{color:var(--a);font-size:.88em;font-weight:600;margin-bottom:13px}
.dz{border:2px dashed var(--b2);border-radius:14px;padding:36px 20px;text-align:center;cursor:pointer;transition:all .3s}
.dz:hover{border-color:var(--a);background:rgba(0,212,255,.04)}
input[type=file]{display:none}
.qg{display:grid;grid-template-columns:repeat(auto-fill,minmax(95px,1fr));gap:8px;margin:12px 0}
.qi{border-radius:8px;overflow:hidden;border:1px solid var(--b);position:relative}
.qi img{width:100%;height:85px;object-fit:cover;display:block}
.qo{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:.7em;font-weight:600;opacity:0;transition:opacity .3s}
.qi.proc .qo{opacity:1;background:rgba(8,12,20,.85)}
.qi.done .qo{opacity:1;background:rgba(16,185,129,.85)}
.qi.err .qo{opacity:1;background:rgba(239,68,68,.82)}
.spin{width:17px;height:17px;border:2px solid rgba(255,255,255,.2);border-top-color:var(--a);border-radius:50%;animation:spin .8s linear infinite;margin-bottom:4px}
@keyframes spin{to{transform:rotate(360deg)}}
.pgw{margin:10px 0;display:none}
.pgb{height:5px;background:var(--b);border-radius:3px;overflow:hidden;margin-bottom:5px}
.pgf{height:100%;background:linear-gradient(90deg,#0099cc,var(--a));border-radius:3px;transition:width .4s}
.btn{padding:9px 20px;border-radius:9px;border:none;cursor:pointer;font-weight:700;font-size:.84em;font-family:inherit;transition:all .2s;display:inline-flex;align-items:center;gap:6px}
.ba{background:linear-gradient(135deg,#0099cc,var(--a));color:#000}
.bg2{background:linear-gradient(135deg,#059669,var(--g));color:#fff}
.br2{background:rgba(239,68,68,.1);color:var(--r);border:1px solid rgba(239,68,68,.3)}
.btn:disabled{opacity:.4;cursor:not-allowed}
.fg{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.fg .fw{grid-column:1/-1}
.ff{display:flex;flex-direction:column;gap:3px}
.ff label{font-size:.67em;color:var(--t3);font-weight:600;text-transform:uppercase}
.ff input,.ff select{background:var(--s2);border:1px solid var(--b2);border-radius:7px;padding:7px 10px;color:var(--t);font-size:.82em;font-family:inherit}
.ff input:focus,.ff select:focus{outline:none;border-color:var(--a)}
.tw{overflow-x:auto;border-radius:9px;border:1px solid var(--b)}
table{width:100%;border-collapse:collapse;font-size:.77em;min-width:800px}
th{background:rgba(0,212,255,.08);color:var(--a);padding:9px 11px;text-align:right;font-size:.75em;font-weight:600;white-space:nowrap;border-bottom:1px solid var(--b)}
td{padding:8px 11px;border-bottom:1px solid var(--b);vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:rgba(0,212,255,.03)}
.bdg{display:inline-flex;padding:2px 7px;border-radius:10px;font-size:.67em;font-weight:600;white-space:nowrap}
.bc{background:rgba(0,212,255,.12);color:var(--a);border:1px solid rgba(0,212,255,.2)}
.bm{background:rgba(139,92,246,.12);color:var(--p);border:1px solid rgba(139,92,246,.2)}
.z1{background:rgba(239,68,68,.15);color:#fca5a5;border:1px solid rgba(239,68,68,.3)}
.z2{background:rgba(245,158,11,.15);color:#fde68a;border:1px solid rgba(245,158,11,.3)}
.z3{background:rgba(234,179,8,.15);color:#fef08a;border:1px solid rgba(234,179,8,.3)}
.z4{background:rgba(16,185,129,.15);color:#6ee7b7;border:1px solid rgba(16,185,129,.3)}
.z5{background:rgba(0,212,255,.15);color:#7dd3fc;border:1px solid rgba(0,212,255,.3)}
.z6{background:rgba(139,92,246,.15);color:#c4b5fd;border:1px solid rgba(139,92,246,.2)}
.dsep{background:rgba(0,212,255,.06);padding:7px 13px;font-size:.74em;color:var(--a);font-weight:600;border-bottom:1px solid var(--b);display:flex;justify-content:space-between}
.sg{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:9px;margin-bottom:16px}
.sc{background:var(--s);border:1px solid var(--b);border-radius:11px;padding:14px;text-align:center}
.sv{font-size:1.6em;font-weight:700;font-family:'JetBrains Mono',monospace}
.sl{font-size:.67em;color:var(--t3);margin-top:3px}
.sa .sv{color:var(--a)}.sgg .sv{color:var(--g)}.so .sv{color:var(--o)}.sp .sv{color:var(--p)}
.gr2{display:grid;grid-template-columns:1fr 1fr;gap:11px}
.barr{display:flex;align-items:center;gap:7px;margin-bottom:6px}
.brl{width:115px;font-size:.74em;color:var(--t2);flex-shrink:0;text-align:left}
.brt{flex:1;background:var(--b);border-radius:3px;height:17px;overflow:hidden}
.brf{height:100%;border-radius:3px;display:flex;align-items:center;padding:0 5px;font-size:.68em;font-weight:700;color:rgba(255,255,255,.9);transition:width .8s;justify-content:flex-end;white-space:nowrap}
.empty{text-align:center;padding:50px;color:var(--t3)}
.empty span{font-size:2.6em;opacity:.3;display:block;margin-bottom:8px}
#toast{position:fixed;bottom:18px;right:18px;padding:11px 18px;border-radius:9px;font-size:.82em;font-weight:600;z-index:9999;opacity:0;transform:translateY(8px);transition:all .3s;pointer-events:none}
#toast.show{opacity:1;transform:translateY(0)}
#toast.ok{background:rgba(16,185,129,.92);color:#fff}
#toast.err{background:rgba(239,68,68,.92);color:#fff}


.fbtn{padding:7px 16px;border-radius:20px;border:1px solid var(--b2);background:var(--s2);color:var(--t2);cursor:pointer;font-size:.8em;font-family:inherit;font-weight:600;transition:all .2s}
.fbtn.active{border-color:var(--a);color:var(--a);background:rgba(0,212,255,.1)}
.fbtn.fblack.active{border-color:#3b82f6;color:#60a5fa;background:rgba(59,130,246,.12)}
.fbtn.fcomfort.active{border-color:#8b5cf6;color:#c4b5fd;background:rgba(139,92,246,.12)}



.zbtn{padding:11px 8px;border-radius:10px;border:1px solid var(--b2);background:var(--s2);color:var(--t2);cursor:pointer;font-size:.82em;font-family:inherit;font-weight:600;transition:all .2s;text-align:center}
.zbtn:hover{border-color:var(--a);color:var(--a);background:rgba(0,212,255,.07)}
.zbtn.sel{border-color:var(--a);color:#000;background:linear-gradient(135deg,#0099cc,var(--a));font-weight:700}
.adv-good{background:rgba(16,185,129,.1);border:2px solid var(--g);border-radius:12px;padding:16px;text-align:center;margin-bottom:12px}
.adv-move{background:rgba(239,68,68,.08);border:2px solid var(--r);border-radius:12px;padding:16px;text-align:center;margin-bottom:12px}
.adv-ok{background:rgba(245,158,11,.08);border:2px solid var(--o);border-radius:12px;padding:16px;text-align:center;margin-bottom:12px}
@media(max-width:580px){.gr2{grid-template-columns:1fr}.fg{grid-template-columns:1fr}}
</style>

</head>
<body>
<div id="toast"></div>
<div class="hdr">
  <div class="logo">
    <div class="logo-icon">🚖</div>
    <div><h1>أوبر داشبورد <span class="dot"></span></h1><p>مشترك • الرياض • يتحدث كل 30 ثانية</p></div>
  </div>
  <div class="kpis">
    <div class="kpi"><div class="v" id="hT">0</div><div class="l">رحلات</div></div>
    <div class="kpi"><div class="v" id="hR">0</div><div class="l">إيراد</div></div>
    <div class="kpi"><div class="v" id="hD">0</div><div class="l">أيام</div></div>
    <div class="kpi"><div class="v" id="hA">0</div><div class="l">متوسط</div></div>
  </div>
</div>
<div class="tabs">
  <div class="tab active" onclick="sw('upload',this)">📸 رفع صور</div>
  <div class="tab" onclick="sw('trips',this)">📋 السجل</div>
  <div class="tab" onclick="sw('analytics',this)">📊 تحليلات</div>

  <div class="tab" onclick="sw('strategy',this)">🎯 استراتيجية</div>
  <div class="tab" onclick="sw('guaranteed',this)">💎 مضمونة</div>
</div>

<!-- رفع صور -->

<div id="pane-upload" class="pane active">
  <div class="card">
    <h3>👤 اسمك</h3>
    <div class="ff"><input type="text" id="uname" placeholder="أدخل اسمك — سيظهر في السجل المشترك" style="font-size:.88em;padding:10px 13px"></div>
  </div>
  <div class="card">
    <h3>📸 رفع صور إيصالات أوبر</h3>
    <div class="dz" id="dz" onclick="document.getElementById('fi').click()" ondragover="event.preventDefault()" ondrop="onDrop(event)">
      <div style="font-size:2.8em;margin-bottom:10px">📱</div>
      <div style="font-size:.95em;font-weight:700;margin-bottom:5px">ارفع صور إيصالات أوبر</div>
      <div style="color:var(--t3);font-size:.8em">اضغط للاختيار · JPG · PNG · HEIC</div>
    </div>
    <input type="file" id="fi" accept="image/*" multiple onchange="onFiles(this.files)">
    <div class="qg" id="qg"></div>
    <div class="pgw" id="pgw"><div class="pgb"><div class="pgf" id="pgf" style="width:0%"></div></div><div id="pgt" style="font-size:.76em;color:var(--t3);text-align:center"></div></div>
    <div style="display:flex;gap:9px;flex-wrap:wrap">
      <button class="btn ba" id="upbtn" onclick="uploadAll()" disabled>🤖 استخراج تلقائي</button>
      <button class="btn br2" onclick="clearQ()">✕ مسح</button>
    </div>
  </div>
  <div class="card">
    <h3>✏️ إضافة يدوية</h3>
    <div class="fg">
      <div class="ff"><label>📅 التاريخ</label><input type="date" id="md"></div>
      <div class="ff"><label>🕐 الوقت</label><input type="time" id="mt"></div>
      <div class="ff"><label>🚗 الفئة</label>
        <select id="mtype">
          <option value="Black">Black</option>
          <option value="Comfort">Comfort</option>
          <option value="UberX">UberX</option>
          <option value="Black Exclusive">Black Exclusive</option>
        </select>
      </div>
      <div class="ff"><label>💰 السعر</label><input type="number" id="mpr" step="0.01"></div>
      <div class="ff fw"><label>📍 الالتقاط</label><input type="text" id="mpu"></div>
      <div class="ff fw"><label>🏁 النزول</label><input type="text" id="mdo"></div>
      <div class="ff"><label>🗺️ منطقة الالتقاط</label><select id="mzp">
        <option value="1">١ شمال غرب</option><option value="2">٢ المطار</option>
        <option value="3">٣ شمال شرق</option><option value="4" selected>٤ غرب وسط</option>
        <option value="5">٥ وسط</option><option value="6">٦ جنوب</option>
      </select></div>
      <div class="ff"><label>🗺️ منطقة النزول</label><select id="mzd">
        <option value="1">١ شمال غرب</option><option value="2">٢ المطار</option>
        <option value="3">٣ شمال شرق</option><option value="4">٤ غرب وسط</option>
        <option value="5" selected>٥ وسط</option><option value="6">٦ جنوب</option>
      </select></div>
      <div class="ff"><label>📏 كم</label><input type="number" id="mkm" step="0.1"></div>
      <div class="ff"><label>⏱ دقيقة</label><input type="number" id="mdur"></div>
      <div class="ff"><label>⭐ تقييم</label><input type="number" id="mrat" step="0.01"></div>
      <div class="ff"><label>🚀 Boost+</label><input type="number" id="mbst" value="0" step="0.01"></div>
    </div>
    <div style="margin-top:10px"><button class="btn bg2" onclick="saveManual()">💾 حفظ</button></div>
  </div>
</div>

<!-- السجل -->

<div id="pane-trips" class="pane">
  <div style="display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap;align-items:center">
    <input type="text" id="srch" placeholder="🔍 بحث..." oninput="renderTrips()" style="flex:1;min-width:140px;background:var(--s);border:1px solid var(--b2);border-radius:7px;padding:8px 11px;color:var(--t);font-family:inherit;font-size:.82em">
    <div style="display:flex;gap:6px">
      <button class="fbtn active" id="ft-all" onclick="setTF('all',this)">الكل</button>
      <button class="fbtn fblack" id="ft-black" onclick="setTF('black',this)">⬛ Black</button>
      <button class="fbtn fcomfort" id="ft-comfort" onclick="setTF('comfort',this)">🟣 Comfort</button>
    </div>
    <button class="btn br2" onclick="if(confirm('مسح كل الرحلات؟'))clearAll()">🗑️</button>
  </div>
  <div id="typeCards" style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px"></div>
  <div id="tOut"></div>
</div>

<!-- تحليلات -->

<div id="pane-analytics" class="pane"><div id="aOut"></div></div>

<!-- خريطة -->

<!-- استراتيجية -->

<div id="pane-strategy" class="pane">
  <!-- فلتر الفئة -->
  <div class="card" style="padding:13px 18px">
    <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
      <span style="font-size:.8em;color:var(--t3);font-weight:600">الفئة:</span>
      <button class="fbtn active" id="sf-all" onclick="setSF('all',this)">الكل</button>
      <button class="fbtn fblack" id="sf-black" onclick="setSF('black',this)">&#x2B1B; Black</button>
      <button class="fbtn fcomfort" id="sf-comfort" onclick="setSF('comfort',this)">&#x1F7E3; Comfort</button>
    </div>
  </div>
  <!-- محدد الموقع الحالي -->
  <div class="card">
    <h3>&#x1F4CD; أين أنت الآن؟</h3>
    <div style="display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:14px">
      <button class="zbtn" onclick="selectZone(1,this)">&#x1F3D8;&#xFE0F; شمال غرب</button>
      <button class="zbtn" onclick="selectZone(2,this)">&#x2708;&#xFE0F; المطار</button>
      <button class="zbtn" onclick="selectZone(3,this)">&#x1F3D9;&#xFE0F; شمال شرق</button>
      <button class="zbtn" onclick="selectZone(4,this)">&#x1F3E6; غرب وسط</button>
      <button class="zbtn" onclick="selectZone(5,this)">&#x1F54C; وسط الرياض</button>
      <button class="zbtn" onclick="selectZone(6,this)">&#x1F306; جنوب</button>
    </div>
    <div id="advisorOut"></div>
  </div>
  <!-- إحصائيات عامة -->
  <div id="sOut"></div>
</div>

<!-- مضمونة -->

<div id="pane-guaranteed" class="pane">
  <div class="card" style="padding:13px 18px">
    <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
      <span style="font-size:.8em;color:var(--t3);font-weight:600">الفئة:</span>
      <button class="fbtn active" id="gf-all" onclick="setGF('all',this)">الكل</button>
      <button class="fbtn fblack" id="gf-black" onclick="setGF('black',this)">&#x2B1B; Black</button>
      <button class="fbtn fcomfort" id="gf-comfort" onclick="setGF('comfort',this)">&#x1F7E3; Comfort</button>
    </div>
  </div>
  <div id="gOut"></div>
</div>

<script>
const ZN={'1':'شمال غرب','2':'المطار','3':'شمال شرق','4':'غرب وسط','5':'وسط الرياض','6':'جنوب'};
const ZA={'1':'١','2':'٢','3':'٣','4':'٤','5':'٥','6':'٦'};
const ZC=['#ef4444','#f59e0b','#eab308','#10b981','#00d4ff','#8b5cf6'];
const ZEMOJI={'1':'🏘️','2':'✈️','3':'🏙️','4':'🏦','5':'🕌','6':'🌆'};
const ZGMAPS={
  '1':'https://www.google.com/maps/dir/?api=1&destination=24.774,46.635',
  '2':'https://www.google.com/maps/dir/?api=1&destination=24.958,46.699',
  '3':'https://www.google.com/maps/dir/?api=1&destination=24.774,46.820',
  '4':'https://www.google.com/maps/dir/?api=1&destination=24.689,46.635',
  '5':'https://www.google.com/maps/dir/?api=1&destination=24.689,46.720',
  '6':'https://www.google.com/maps/dir/?api=1&destination=24.580,46.720'
};
let trips=[],qFiles=[],tf='all',sf='all',gf='all',selectedZone=null;
document.getElementById('mt').value=new Date().toTimeString().slice(0,5);

async function load(){
  try{
    const r=await fetch('/api/trips');trips=await r.json();
    updateHdr();renderTrips();renderTypeCards();

  }catch(e){}
}
load();setInterval(load,30000);

const isB=t=>(t.type||'').toLowerCase().includes('black');
const isC=t=>(t.type||'').toLowerCase().includes('comfort');
function applyF(arr,f){return f==='black'?arr.filter(isB):f==='comfort'?arr.filter(isC):arr;}

function setTF(f,el){tf=f;document.querySelectorAll('#pane-trips .fbtn').forEach(b=>b.classList.remove('active'));el.classList.add('active');renderTrips();renderTypeCards();}

function renderTypeCards(){
  const el=document.getElementById('typeCards');if(!el)return;
  const bl=trips.filter(isB),co=trips.filter(isC);
  const br=bl.reduce((s,t)=>s+t.price,0),cr=co.reduce((s,t)=>s+t.price,0);
  el.innerHTML=
    '<div style="background:rgba(59,130,246,.1);border:1px solid rgba(59,130,246,.25);border-radius:11px;padding:14px;text-align:center">'+
    '<div style="font-size:.72em;color:#93c5fd;font-weight:700;margin-bottom:5px">⬛ Black</div>'+
    '<div style="font-size:1.8em;font-weight:700;color:#60a5fa;font-family:JetBrains Mono,monospace">'+bl.length+'</div>'+
    '<div style="font-size:.68em;color:#64748b;margin-bottom:4px">رحلة</div>'+
    '<div style="font-size:.9em;font-weight:700;color:#3b82f6">'+br.toFixed(0)+' ر</div>'+
    '<div style="font-size:.65em;color:#64748b">متوسط '+(bl.length?(br/bl.length).toFixed(1):0)+' ر</div></div>'+
    '<div style="background:rgba(139,92,246,.1);border:1px solid rgba(139,92,246,.25);border-radius:11px;padding:14px;text-align:center">'+
    '<div style="font-size:.72em;color:#c4b5fd;font-weight:700;margin-bottom:5px">🟣 Comfort</div>'+
    '<div style="font-size:1.8em;font-weight:700;color:#a78bfa;font-family:JetBrains Mono,monospace">'+co.length+'</div>'+
    '<div style="font-size:.68em;color:#64748b;margin-bottom:4px">رحلة</div>'+
    '<div style="font-size:.9em;font-weight:700;color:#8b5cf6">'+cr.toFixed(0)+' ر</div>'+
    '<div style="font-size:.65em;color:#64748b">متوسط '+(co.length?(cr/co.length).toFixed(1):0)+' ر</div></div>';
}

function updateHdr(){
  const rev=trips.reduce((s,t)=>s+t.price,0),days=new Set(trips.map(t=>t.date)).size;
  document.getElementById('hT').textContent=trips.length;

function renderGuaranteed(){
  const el=document.getElementById('gOut');
  if(!el)return;
  const filtered=applyF(trips,gf);

    el.innerHTML='<div class="empty"><span>💎</span><p>أضف رحلات أكثر لاكتشاف الأنماط المضمونة</p></div>';
    return;
  }

  // تجميع الرحلات حسب: منطقة الالتقاط + منطقة النزول + الساعة (±1)
  const patterns={};
  filtered.forEach(t=>{
    if(!t.time)return;
    const h=parseInt(t.time);
    // نجمّع كل الساعات المتقاربة تحت نفس المفتاح
    const hKey=Math.floor(h/2)*2; // تقريب لأقرب ساعتين

      hKey, trips:[], totalRev:0, hours:[]

    patterns[key].totalRev+=t.price;
    patterns[key].hours.push(h);

function runAdvisor(zone){
  const el=document.getElementById('advisorOut');
  const filtered=applyF(trips,sf);
  if(!filtered.length){el.innerHTML='<div style="color:var(--t3);font-size:.85em;text-align:center;padding:20px">أضف رحلات أولاً لتفعيل التحليل</div>';return;}

  const now=new Date();
  const curHour=now.getHours();

  const zoneScore={};
  for(let z=1;z<=6;z++){
    const zTrips=filtered.filter(t=>{
      if(parseInt(t.zone_pickup)!==z)return false;
      if(!t.time)return false;
      const th=parseInt(t.time);
      return Math.abs(th-curHour)<=1;
    });
    const rev=zTrips.reduce((s,t)=>s+t.price,0);
    zoneScore[z]={n:zTrips.length,rev,avg:zTrips.length?rev/zTrips.length:0};
  }

  const curScore=zoneScore[zone];
  const allScores=Object.entries(zoneScore).sort((a,b)=>b[1].avg-a[1].avg);
  const bestZone=allScores[0];
  const bestZ=parseInt(bestZone[0]);
  const bestScore=bestZone[1];
  const timeLabel=(curHour>=12?(curHour===12?'12م':(curHour-12)+'م'):curHour+'ص')+':00';
  const totalNow=Object.values(zoneScore).reduce((s,v)=>s+v.n,0);

    h+='</div>';

    h+='<div style="font-size:.78em;color:var(--t2);margin-bottom:8px">'+ZN[zone]+' · '+timeLabel+' · '+sfLabel+' · '+curScore.avg.toFixed(0)+' ريال</div>';
    h+='<div style="background:rgba(0,0,0,.2);border-radius:8px;padding:10px;margin-top:4px">';

    h+='</div></div>';

  const n=filtered.length,rev=filtered.reduce((s,t)=>s+t.price,0);
  const bl=trips.filter(isB),co=trips.filter(isC);
  const br=bl.reduce((s,t)=>s+t.price,0),cr=co.reduce((s,t)=>s+t.price,0);
  const sfLabel=sf==='black'?'Black':sf==='comfort'?'Comfort':'الكل';
  let h='<div class="card"><h3>📈 ملخص الأداء · '+sfLabel+'</h3><div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:8px">';
  h+='<div style="background:var(--s2);border:1px solid var(--b);border-radius:9px;padding:12px;text-align:center"><div style="font-size:1.5em;font-weight:700;color:var(--a);font-family:JetBrains Mono,monospace">'+n+'</div><div style="font-size:.68em;color:var(--t3)">رحلة</div></div>';
  h+='<div style="background:var(--s2);border:1px solid var(--b);border-radius:9px;padding:12px;text-align:center"><div style="font-size:1.5em;font-weight:700;color:var(--g);font-family:JetBrains Mono,monospace">'+rev.toFixed(0)+'</div><div style="font-size:.68em;color:var(--t3)">إيراد</div></div>';
  h+='<div style="background:rgba(59,130,246,.1);border:1px solid rgba(59,130,246,.2);border-radius:9px;padding:12px;text-align:center"><div style="font-size:1.5em;font-weight:700;color:#60a5fa;font-family:JetBrains Mono,monospace">'+bl.length+'</div><div style="font-size:.68em;color:#93c5fd">Black · '+(bl.length?(br/bl.length).toFixed(0):0)+' ر</div></div>';
  h+='<div style="background:rgba(139,92,246,.1);border:1px solid rgba(139,92,246,.2);border-radius:9px;padding:12px;text-align:center"><div style="font-size:1.5em;font-weight:700;color:#a78bfa;font-family:JetBrains Mono,monospace">'+co.length+'</div><div style="font-size:.68em;color:#c4b5fd">Comfort · '+(co.length?(cr/co.length).toFixed(0):0)+' ر</div></div>';
  h+='</div></div>';
  el.innerHTML=h;
}

async function delTrip(id){await fetch('/api/trips/'+id,{method:'DELETE'});await load();}
async function clearAll(){for(const t of trips)await fetch('/api/trips/'+t.id,{method:'DELETE'});await load();}
function onDrop(e){e.preventDefault();onFiles(e.dataTransfer.files);}
function onFiles(fs){
  qFiles=Array.from(fs).filter(f=>f.type.startsWith('image/')||/\.(heic|heif|jpg|jpeg|png)$/i.test(f.name));
  if(!qFiles.length)return;
  document.getElementById('qg').innerHTML=qFiles.map((f,i)=>{const u=URL.createObjectURL(f);return '<div class="qi" id="qi'+i+'"><img src="'+u+'"><div class="qo" id="qo'+i+'"><div class="spin" id="sp'+i+'" style="display:none"></div><span id="st'+i+'"></span></div></div>';}).join('');
  document.getElementById('upbtn').disabled=false;
}
function clearQ(){qFiles=[];document.getElementById('qg').innerHTML='';document.getElementById('upbtn').disabled=true;document.getElementById('pgw').style.display='none';}
async function uploadAll(){
  if(!qFiles.length)return;
  const name=document.getElementById('uname').value.trim()||'مجهول';
  document.getElementById('upbtn').disabled=true;
  document.getElementById('pgw').style.display='block';
  document.getElementById('pgf').style.width='10%';
  document.getElementById('pgt').textContent='جاري الاستخراج...';
  qFiles.forEach((_,i)=>{document.getElementById('qi'+i).className='qi proc';document.getElementById('sp'+i).style.display='block';document.getElementById('st'+i).textContent='جاري...';});
  const fd=new FormData();fd.append('added_by',name);qFiles.forEach(f=>fd.append('images',f));
  try{
    const r=await fetch('/api/upload',{method:'POST',body:fd});
    document.getElementById('pgf').style.width='100%';
    const res=await r.json();let ok=0,err=0;
    res.forEach((x,i)=>{document.getElementById('sp'+i).style.display='none';if(x.status==='ok'){document.getElementById('qi'+i).className='qi done';document.getElementById('st'+i).textContent='✓';ok++;}else{document.getElementById('qi'+i).className='qi err';document.getElementById('st'+i).textContent='✗';err++;}});
    toast('✅ '+ok+' رحلة'+(err?' · '+err+' فشل':''),ok?'ok':'err');await load();
  }catch(e){toast('❌ خطأ','err');}
  document.getElementById('upbtn').disabled=false;document.getElementById('pgw').style.display='none';
}
async function saveManual(){
  const t={date:document.getElementById('md').value,time:document.getElementById('mt').value,type:document.getElementById('mtype').value||'Black',price:parseFloat(document.getElementById('mpr').value)||0,pickup:document.getElementById('mpu').value||'',dropoff:document.getElementById('mdo').value||'',zone_pickup:document.getElementById('mzp').value,zone_dropoff:document.getElementById('mzd').value,km:parseFloat(document.getElementById('mkm').value)||0,duration:parseInt(document.getElementById('mdur').value)||0,rating:parseFloat(document.getElementById('mrat').value)||0,boost:parseFloat(document.getElementById('mbst').value)||0,notes:'',added_by:document.getElementById('uname').value.trim()||'يدوي'};
  if(!t.price){toast('يرجى إدخال السعر','err');return;}
  await fetch('/api/trip',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(t)});
  toast('✅ تم الحفظ!','ok');await load();
}
function sw(name,el){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.pane').forEach(p=>p.classList.remove('active'));
  el.classList.add('active');document.getElementById('pane-'+name).classList.add('active');
  if(name==='analytics')renderAnalytics();
  if(name==='strategy'){renderStrategy();if(selectedZone)runAdvisor(selectedZone);}
  if(name==='trips'){renderTypeCards();}
  if(name==='guaranteed'){renderGuaranteed();}
}
function toast(msg,type){const n=document.getElementById('toast');n.textContent=msg;n.className='show '+(type||'ok');setTimeout(()=>n.className='',3500);}
</script>
